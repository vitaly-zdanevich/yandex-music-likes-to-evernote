name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v1.0.0
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PACKAGE_NAME: yandex-music-likes-to-evernote
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Check tag matches Cargo version
        id: version
        run: |
          tag="${RELEASE_TAG}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release tag must look like v1.0.0"
            exit 1
          fi

          version="${tag#v}"
          cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)"

          if [ "$cargo_version" != "$version" ]; then
            echo "::error::Cargo version $cargo_version does not match tag $tag"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  checks:
    name: Release Checks
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Restore Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: release-checks-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-checks-cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --locked --all-targets

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.package }}
    needs:
      - validate
      - checks
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: linux-amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - package: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Restore Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: release-cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-cargo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}" --bin "$PACKAGE_NAME"

      - name: Package release archive
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_PACKAGE: ${{ matrix.package }}
          RUST_TARGET: ${{ matrix.target }}
        run: |
          archive_base="${PACKAGE_NAME}-${RELEASE_VERSION}-${RELEASE_PACKAGE}"
          stage="dist/${archive_base}"

          mkdir -p "$stage"
          cp "target/${RUST_TARGET}/release/${PACKAGE_NAME}" "$stage/"
          cp README.md "$stage/"
          cp LICENSE "$stage/"

          tar -C dist -czf "${archive_base}.tar.gz" "$archive_base"
          sha256sum "${archive_base}.tar.gz" > "${archive_base}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.package }}
          path: |
            ${{ env.PACKAGE_NAME }}-${{ needs.validate.outputs.version }}-${{ matrix.package }}.tar.gz
            ${{ env.PACKAGE_NAME }}-${{ needs.validate.outputs.version }}-${{ matrix.package }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_TAG" --generate-notes
          fi
