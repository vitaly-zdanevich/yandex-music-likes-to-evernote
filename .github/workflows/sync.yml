name: Sync Yandex Music Likes

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: yandex-music-likes-to-evernote-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      YANDEX_MUSIC_TOKEN: ${{ secrets.YANDEX_MUSIC_TOKEN }}
      EVERNOTE_AUTH_TOKEN: ${{ secrets.EVERNOTE_AUTH_TOKEN }}
      EVERNOTE_NOTE_STORE_URL: ${{ secrets.EVERNOTE_NOTE_STORE_URL || vars.EVERNOTE_NOTE_STORE_URL }}
      EVERNOTE_USER_STORE_URL: ${{ vars.EVERNOTE_USER_STORE_URL || 'https://www.evernote.com/edam/user' }}
      EVERNOTE_NOTEBOOK_GUID: ${{ vars.EVERNOTE_NOTEBOOK_GUID }}
      GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
      STATE_PATH: ${{ vars.STATE_PATH || 'state.json' }}
      DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
      MAX_TRACKS_PER_RUN: ${{ vars.MAX_TRACKS_PER_RUN || '10' }}
      ENRICH_EXTERNAL_LINKS: ${{ vars.ENRICH_EXTERNAL_LINKS || 'true' }}
      SONGLINK_USER_COUNTRY: ${{ vars.SONGLINK_USER_COUNTRY || 'US' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore sync state
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.STATE_PATH }}
          key: yandex-music-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            yandex-music-state-

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Sync liked tracks
        run: |
          export DRY_RUN="${DRY_RUN:-false}"
          export MAX_TRACKS_PER_RUN="${MAX_TRACKS_PER_RUN:-10}"
          export ENRICH_EXTERNAL_LINKS="${ENRICH_EXTERNAL_LINKS:-true}"
          export SONGLINK_USER_COUNTRY="${SONGLINK_USER_COUNTRY:-US}"
          cargo run --locked -- sync

      - name: Ensure state file exists
        if: always()
        run: |
          mkdir -p "$(dirname "$STATE_PATH")"
          test -f "$STATE_PATH" || printf '{"processedTrackIds":[]}\n' > "$STATE_PATH"

      - name: Save sync state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ env.STATE_PATH }}
          key: yandex-music-state-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload state artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: state
          path: ${{ env.STATE_PATH }}
          retention-days: 90
